<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Planner{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://unpkg.com/htmx.org@1.9.12" crossorigin="anonymous"></script>
</head>
<body>
  <header class="site-header">
    <a href="/" class="site-logo">
      <div class="logo-icon">&#9670;</div>
      Planner
    </a>
    <nav>
      {% if user is defined and user %}
        <a href="/gameplans">My Plans</a>
        <a href="/interview">+ New Plan</a>
        <span class="nav-username">{{ user.username }}</span>
        <form action="/logout" method="post" style="display:inline">
          <input type="hidden" name="csrf_token" value="{{ csrf_token if csrf_token is defined else '' }}" />
          <button type="submit" class="btn-nav-logout">Sign out</button>
        </form>
      {% else %}
        <a href="/login">Sign in</a>
        <a href="/register" class="btn btn-primary btn-sm btn-nav">Get started</a>
      {% endif %}
    </nav>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <small>Planner &mdash; plan smarter, ship faster &nbsp;&middot;&nbsp; <a href="/health">Status</a></small>
  </footer>

  <script>
    // Copy-to-clipboard helper
    document.addEventListener('click', function(e) {
      const btn = e.target.closest('[data-copy]');
      if (!btn) return;
      const text = btn.dataset.copy;
      navigator.clipboard.writeText(text).then(() => {
        const orig = btn.textContent;
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 2000);
      });
    });
    // Live progress slider label
    document.addEventListener('input', function(e) {
      if (e.target.id === 'progress_slider') {
        const lbl = document.getElementById('progress_display');
        if (lbl) lbl.textContent = e.target.value + '%';
        const fill = document.getElementById('progress_fill');
        if (fill) fill.style.width = e.target.value + '%';
      }
    });

    // Interactive checklist checkboxes + auto-sync counter
    (function () {
      const body = document.querySelector('.gameplan-body');
      if (!body) return;

      const boxes = Array.from(body.querySelectorAll('input[type="checkbox"]'));
      if (!boxes.length) return;

      // Remove the disabled attribute so boxes are clickable
      boxes.forEach(cb => { cb.disabled = false; });

      function updateChecklist() {
        const checked = boxes.filter(b => b.checked).length;
        const total   = boxes.length;
        const pct     = Math.round(checked / total * 100);

        const pctEl   = document.getElementById('checklist_pct_display');
        const lblEl   = document.getElementById('checklist_count_label');
        const valEl   = document.getElementById('sync_progress_val');
        const fillEl  = document.getElementById('progress_fill');

        if (pctEl)  pctEl.textContent  = pct + '%';
        if (lblEl)  lblEl.textContent  = checked + ' of ' + total + ' tasks checked';
        if (valEl)  valEl.value        = pct;
        if (fillEl) fillEl.style.width = pct + '%';
      }

      boxes.forEach(cb => cb.addEventListener('change', updateChecklist));
      updateChecklist();
    })();
  </script>
</body>
</html>
