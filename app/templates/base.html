<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Planner Agent{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://unpkg.com/htmx.org@1.9.12" crossorigin="anonymous"></script>
</head>
<body>
  <header class="site-header">
    <a href="/" class="site-logo">&#9678; Planner Agent</a>
    <nav>
      {% if user is defined and user %}
        <a href="/gameplans">My Plans</a>
        <a href="/interview">New Plan</a>
        <span class="nav-username">{{ user.username }}</span>
        <form action="/logout" method="post" style="display:inline">
          <input type="hidden" name="csrf_token" value="{{ csrf_token if csrf_token is defined else '' }}" />
          <button type="submit" class="btn-nav-logout">Sign out</button>
        </form>
      {% else %}
        <a href="/login">Sign in</a>
        <a href="/register" class="btn btn-primary btn-nav">Get started</a>
      {% endif %}
    </nav>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <small>Planner Agent v0.3.0</small>
  </footer>
</body>
</html>
