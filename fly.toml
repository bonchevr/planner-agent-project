# fly.toml app configuration file generated for planner-agent on 2026-03-06T14:32:29Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'planner-agent'
primary_region = 'lhr'

[build]

[env]
  APP_ENV = 'production'
  PORT = '8000'
  WEB_WORKERS = '1'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '15s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
