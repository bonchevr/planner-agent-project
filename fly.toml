# fly.toml app configuration file generated for planner-agent on 2026-03-06T15:11:12Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'planner-agent'
primary_region = 'lhr'

[build]

[env]
  APP_ENV     = 'production'
  PORT        = '8000'
  WEB_WORKERS = '2'
  # DATABASE_URL, SECRET_KEY, BASE_URL → fly secrets set (never here)

[http_service]
  internal_port        = 8000
  force_https          = true
  auto_stop_machines   = 'off'
  auto_start_machines  = true
  min_machines_running = 1
  processes            = ['app']

  [[http_service.checks]]
    grace_period = '15s'
    interval     = '30s'
    method       = 'GET'
    path         = '/health'
    timeout      = '5s'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
