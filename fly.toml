# fly.toml — Planner Agent on Fly.io
# Docs: https://fly.io/docs/reference/configuration/
#
# Before first deploy:
#   1. Change `app` to your unique Fly app name (run `fly launch` to generate).
#   2. Change `primary_region` to the region closest to your users.
#      Regions: https://fly.io/docs/reference/regions/
#      Recommended: lhr (London), iad (Virginia), sea (Seattle), fra (Frankfurt)

app = "planner-agent"
primary_region = "lhr"

[build]
  # Uses the repo's Dockerfile automatically — no extra config needed.

[env]
  APP_ENV    = "production"
  PORT       = "8000"
  WEB_WORKERS = "2"
  # DATABASE_URL, SECRET_KEY, BASE_URL → set via `fly secrets set` (never here)

[http_service]
  internal_port       = 8000
  force_https         = true
  auto_stop_machines  = false   # keep the machine warm; 1 VM is within the free allowance
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "15s"
    interval     = "30s"
    method       = "GET"
    path         = "/health"
    timeout      = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus     = 1
  memory   = "256mb"
