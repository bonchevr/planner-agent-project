# fly.toml app configuration file generated for planner-agent on 2026-03-06T15:11:12Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'planner-agent'
primary_region = 'lhr'

[build]

[env]
  APP_ENV     = 'production'
  PORT        = '8000'
  WEB_WORKERS = '2'
  # DATABASE_URL, SECRET_KEY, BASE_URL → fly secrets set (never here)
  # SMTP config → fly secrets set SMTP_HOST=... SMTP_PORT=587 SMTP_USER=... SMTP_PASSWORD=... SMTP_FROM=...

[http_service]
  internal_port        = 8000
  force_https          = true
  auto_stop_machines   = 'stop'   # machine sleeps when idle; wakes on first request (~2s cold start)
  auto_start_machines  = true
  min_machines_running = 0
  processes            = ['app']

  [[http_service.checks]]
    grace_period = '15s'
    interval     = '30s'
    method       = 'GET'
    path         = '/health'
    timeout      = '5s'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
