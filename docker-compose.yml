services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      - APP_ENV=development
    volumes:
      # Named volume — Docker creates and manages the directory automatically.
      # The SQLite file lives at /app/data/planner.db inside the container.
      - db-data:/app/data
    restart: unless-stopped

volumes:
  db-data:
